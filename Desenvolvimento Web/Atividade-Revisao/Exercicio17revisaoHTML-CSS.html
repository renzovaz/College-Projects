<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 17 - HTML CSS - </title>
    <style>
        body {
            margin: 0;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 5rem ;
        }
        .container {
            display: grid;
            grid-gap: 1rem;
            grid-template-areas: 
                "header header"
                "aside main"
                "footer footer"
            ;
            grid-template-columns: 20% 80%;
            grid-template-rows: 10% 1fr 10%;
            height: 100vh;
        }
        header {
            background-color: deeppink;
            grid-area: header;
        }
        main {
            background-color: darkorange;
            grid-area: main;
        }
        aside {
            background-color: mediumblue;
            grid-area: aside;
        }
        footer {
            background-color: mediumspringgreen;
            grid-area: footer;
        }
    </style>
</head>
<body>

      <div class="container">
        <header>
            1
        </header>
        <main>
            2
        </main>
        <aside>
            3
        </aside>
        <footer>
            4
        </footer>
    </div>
</body>
</html>
