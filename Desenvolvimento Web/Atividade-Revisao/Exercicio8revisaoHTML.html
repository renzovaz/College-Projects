<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 8 HTML - Formulário</title>
</head>
<body>
    <h1>Exemplo 8 HTML - Formulários</h1>
    
    <form action="paginadestino.php" method="POST"> 

        <div>
            <label for="txtEmail">Digite seu Usuário (E-mail):</label> <br>
            <input type="email" name="txtEmail" id="txtEmail" placeholder="exemplo@email.com" required>
        </div>
        
        <br>

        <div>
            <label for="txtSenha">Digite sua Senha:</label> <br>
            <input type="password" name="txtSenha" id="txtSenha" required>
        </div>

        <br>

        <div>
            <button type="submit">Enviar Dados</button>
            <button type="reset">Limpar</button>
        </div>

    </form>
</body>
</html>
